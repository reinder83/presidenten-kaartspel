# Zelf lokaal bouwen in plaats van de kant-en-klare image van ghcr.io gebruiken:
#   docker compose -f docker-compose.build.yml up --build
services:
  presidenten:
    build: .
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
